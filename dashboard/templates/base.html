<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TalentDash AI Pipeline</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand"
           href="/">
            TalentDash
        </a>

        <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
            class="collapse navbar-collapse"
            id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="/">
                        Dashboard
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/companies">
                        Companies
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/salaries">
                        Salaries
                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="/report">
                        Quality Report
                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container">

    {% block content %}

    {% endblock %}

</div>

<div class="footer">

    <h5 style="color:#222;">
        TalentDash AI Salary Pipeline
    </h5>

    <p>

        AI Data Engineering Internship Project

    </p>

    <small>

        Pipeline:
        Scraper →
        Gemini →
        Validation →
        Company Normalization →
        Level Mapping →
        PostgreSQL →
        Deduplication

    </small>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
